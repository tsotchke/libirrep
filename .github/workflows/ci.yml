# SPDX-License-Identifier: MIT
name: ci

on:
  push:
    branches: [master, 'feat/**', 'fix/**']
  pull_request:
    branches: [master]

jobs:
  # ---------------------------------------------------------------------------
  # Unix matrix (macOS + Linux, both architectures). One matrix entry per
  # (runner × compiler) — keeps each job tightly scoped so a single platform
  # failure is immediately localisable instead of buried in a single log.
  # ---------------------------------------------------------------------------
  unix:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: macos-arm64-clang,   runner: macos-14,         cc: clang, sanitize: 'true'  }
          - { name: macos-x86_64-clang,  runner: macos-13,         cc: clang, sanitize: 'true'  }
          - { name: linux-x86_64-gcc,    runner: ubuntu-22.04,     cc: gcc,   sanitize: 'false' }
          - { name: linux-x86_64-clang,  runner: ubuntu-22.04,     cc: clang, sanitize: 'true'  }
          - { name: linux-arm64-gcc,     runner: ubuntu-24.04-arm, cc: gcc,   sanitize: 'false' }
    env:
      CC: ${{ matrix.cc }}
    steps:
      - uses: actions/checkout@v4

      # Only needed when CC=clang on Linux runners (the default is gcc there).
      - name: install clang (Linux)
        if: runner.os == 'Linux' && matrix.cc == 'clang'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang

      - name: print-config
        shell: bash
        run: |
          set -euxo pipefail
          make print-config

      - name: build + test + check-headers + check-abi
        shell: bash
        run: |
          set -euxo pipefail
          make all

      - name: asan
        if: matrix.sanitize == 'true'
        shell: bash
        run: |
          set -euxo pipefail
          make asan

      - name: ubsan
        if: matrix.sanitize == 'true'
        shell: bash
        run: |
          set -euxo pipefail
          make ubsan

      # asan/ubsan instrument the static library with sanitizer hooks. Bench
      # binaries link against the library without -fsanitize=…, so on Apple
      # clang (which does not ship libubsan for linking) the link step fails
      # with "undefined symbols: ___ubsan_handle_*". Wipe the build dir first
      # to force a clean, non-instrumented lib rebuild.
      - name: bench
        shell: bash
        run: |
          set -euxo pipefail
          make distclean
          make bench

      - name: release artefact
        shell: bash
        run: |
          set -euxo pipefail
          make release

      - name: upload release tarball
        uses: actions/upload-artifact@v4
        with:
          name: libirrep-${{ matrix.name }}
          path: release/liblibirrep-*-*.tar.gz
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Windows via MSYS2 + MinGW. Keeps the Makefile + bash release path working
  # unchanged. A separate VS/ClangCL path would ship Windows-native binaries
  # without the MSYS2 runtime dependency; tracked as a future improvement.
  # ---------------------------------------------------------------------------
  windows:
    name: windows-x86_64-mingw
    runs-on: windows-latest
    defaults:
      run:
        shell: 'msys2 {0}'
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update:  false
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            make
            coreutils
            python
            tar

      - name: print-config
        run: |
          set -euxo pipefail
          make print-config

      - name: build + test + check-headers + check-abi
        run: |
          set -euxo pipefail
          make all

  # ---------------------------------------------------------------------------
  # libFuzzer smoke run (clang on Linux only — Apple clang strips the runtime
  # library). Each harness is discovered via a glob so new fuzz targets start
  # running in CI automatically.
  # ---------------------------------------------------------------------------
  fuzz:
    name: fuzz-smoke
    runs-on: ubuntu-22.04
    env:
      CC: clang
    steps:
      - uses: actions/checkout@v4

      - name: install clang
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang

      - name: build fuzz targets
        shell: bash
        run: |
          set -euxo pipefail
          make fuzz

      - name: run each harness for 60 s
        shell: bash
        run: |
          set -euxo pipefail
          for bin in build/bin/fuzz_*; do
            [ -f "$bin" ] || continue
            # Skip the non-libFuzzer _driver companions; they are exercised
            # by `make fuzz-run` (non-coverage-guided random-byte driver).
            case "$bin" in *_driver) continue;; esac
            echo "=== $bin ==="
            "$bin" -max_total_time=60 -print_final_stats=1
          done

  # ---------------------------------------------------------------------------
  # CMake surface. Confirms the second supported build system still works and
  # ctest picks up every test binary CMake sees.
  # ---------------------------------------------------------------------------
  cmake:
    name: cmake-build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: configure
        shell: bash
        run: |
          set -euxo pipefail
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: build
        shell: bash
        run: |
          set -euxo pipefail
          cmake --build build --parallel
      - name: ctest
        shell: bash
        run: |
          set -euxo pipefail
          ctest --test-dir build --output-on-failure

  # ---------------------------------------------------------------------------
  # Advisory linter. Non-blocking while clang-format rules stabilise.
  # ---------------------------------------------------------------------------
  lint:
    name: clang-format
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: clang-format
        shell: bash
        run: |
          set -euxo pipefail
          make lint
