# SPDX-License-Identifier: MIT
name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Unix triples — builds a per-runner release tarball and uploads it as a
  # workflow artefact. The publish job gathers all of them and cuts the
  # GitHub release in a single atomic step.
  # ---------------------------------------------------------------------------
  unix:
    name: release-${{ matrix.triple }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { triple: macos-arm64,   runner: macos-14         }
          - { triple: macos-x86_64,  runner: macos-13         }
          - { triple: linux-x86_64,  runner: ubuntu-22.04     }
          - { triple: linux-arm64,   runner: ubuntu-24.04-arm }
    steps:
      - uses: actions/checkout@v4

      - name: extract version from tag
        id: version
        shell: bash
        run: |
          set -euxo pipefail
          echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: build release
        shell: bash
        run: |
          set -euxo pipefail
          bash scripts/build_release.sh ${{ steps.version.outputs.value }}

      - name: upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: libirrep-${{ steps.version.outputs.value }}-${{ matrix.triple }}
          path: release/liblibirrep-${{ steps.version.outputs.value }}-${{ matrix.triple }}.tar.gz
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Windows (MSYS2 MinGW). Same release script, bash-compatible.
  # ---------------------------------------------------------------------------
  windows:
    name: release-windows-x86_64
    runs-on: windows-latest
    defaults:
      run:
        shell: 'msys2 {0}'
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update:  false
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            make
            coreutils
            python
            tar

      - name: extract version from tag
        id: version
        run: |
          set -euxo pipefail
          echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: build release
        run: |
          set -euxo pipefail
          bash scripts/build_release.sh ${{ steps.version.outputs.value }}

      - name: upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: libirrep-${{ steps.version.outputs.value }}-windows-x86_64
          path: release/liblibirrep-${{ steps.version.outputs.value }}-windows-x86_64.tar.gz
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Publish step. Gates on every per-triple build succeeding; collects all
  # tarballs, computes SHA256SUMS.txt centrally, auto-detects prerelease
  # status from the tag, and cuts a single GitHub release.
  # ---------------------------------------------------------------------------
  publish:
    name: publish-release
    needs: [unix, windows]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: download all tarballs
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: libirrep-*
          merge-multiple: true

      - name: inventory + SHA256SUMS
        shell: bash
        run: |
          set -euxo pipefail
          cd dist
          ls -la
          sha256sum liblibirrep-*.tar.gz | sort > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: libirrep ${{ github.ref_name }}
          generate_release_notes: true
          # Auto-detect pre-release tags by suffix — alpha / beta / rc all
          # get the prerelease banner on the Releases page.
          prerelease: ${{ contains(github.ref_name, 'alpha') ||
                           contains(github.ref_name, 'beta')  ||
                           contains(github.ref_name, 'rc')    }}
          fail_on_unmatched_files: true
          files: |
            dist/*
